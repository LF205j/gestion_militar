
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion Militar - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="text/javascript">
        window.history.forward();
        function noBack() {
            window.history.forward();
        }
    </script>
</head>
<body onload="noBack();" onpageshow="if (event.persisted) noBack();" onunload="">

<div class="login-container">
    <section class="branding-side">
        <div class="branding-content">
            <div class="logo-container">
                <div class="logo-icon"><i class="fas fa-medal"></i></div>
                <h1>Gestion Militar</h1>
            </div>
            <h2>Tu Sistema de Gestion Militar</h2>
            <p>Soldados, Cuarteles, Cuerpos, Compañías y Servicios</p>
        </div>
    </section>

    <section class="form-side">
        <div class="login-card">
            <h3>Iniciar Sesión</h3>
            <p class="subtitle">Ingresa tus credenciales para acceder al sistema de gestión</p>

            <form th:action="@{/login}" method="post">

                <div th:if="${param.error}" style="color: red; margin-bottom: 10px;">
                    Usuario o contraseña incorrectos.
                </div>

                <div th:if="${param.logout}" style="color: green; margin-bottom: 10px;">
                    Has cerrado sesión exitosamente.
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" name="email" placeholder="Tu usuario" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="contrasenia" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </section>
</div>
</body>
</html>
