<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Información del Cuartel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/Home.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
</head>
<body class="bg-light">
<header th:replace="fragments/navbar :: navbar_militar"></header>
<main>
</main>

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h2 class="mb-0">Datos del Cuartel Asignado</h2>
    </div>
    <div class="card-body">
      <div th:if="${cuartel != null}">
        <table class="table table-striped">
          <tbody>
          <tr>
            <th>ID de Identificación:</th>
            <td th:text="${cuartel.id}">0</td>
          </tr>
          <tr>
            <th>Nombre del Cuartel:</th>
            <td th:text="${cuartel.nombreCuartel}">Nombre no disponible</td>
          </tr>
          <tr>
            <th>Ubicación Geográfica:</th>
            <td th:text="${cuartel.ubicacion}">Ubicación no disponible</td>
          </tr>
          <tr>
            <th>Compañías Adscriptas:</th>
            <td th:text="${cuartel.cantidadCompanias}">0</td>
          </tr>
          </tbody>
        </table>
      </div>

      <div th:unless="${cuartel != null}" class="alert alert-warning">
        Usted no tiene un cuartel asignado en el sistema actualmente.
      </div>

      <div class="mt-3">
        <a href="/api/home" class="btn btn-secondary">Volver al Inicio</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
