<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Panel de Consultas - Gestión Militar</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/Home.css}">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .main-container { padding: 2rem; max-width: 1200px; margin: 0 auto; color: white; }

    /* Cuadrícula de búsqueda */
    .grid-consultas {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }

    .card-busqueda {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 10px;
        border: 1px solid #333;
        transition: transform 0.2s;
    }

    .card-busqueda:hover { border-color: #555; transform: translateY(-5px); }

    .card-busqueda h3 {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 1.1rem;
        margin-bottom: 15px;
        color: #ccc;
    }

    .form-control {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: #2d2d2d;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
    }

    .btn-accion {
        width: 100%;
        padding: 10px;
        background: #e0e0e0;
        color: #1a1a1a;
        border: none;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
    }

    /* Tabla de resultados */
    .resultados-container { background: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333; }
    .tabla-resultados { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .tabla-resultados th { background: #333; color: #ddd; padding: 12px; text-align: left; }
    .tabla-resultados td { padding: 12px; border-bottom: 1px solid #222; color: #bbb; }

    .badge-criterio {
        background: #34495e;
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 0.9rem;
    }
  </style>
</head>
<body>
<header th:replace="fragments/navbar :: navbar_militar"></header>

<main class="main-container">
  <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
    <i data-lucide="search" style="width: 32px; height: 32px;"></i>
    <h1>Panel de Consultas de Asignación</h1>
  </div>

  <div class="grid-consultas">

    <div class="card-busqueda">
      <h3><i data-lucide="building-2"></i> Cuartel</h3>
      <form th:action="@{/api/oficial/asignacion/consultar}" th:object="${asignacionDto}" method="post">
        <input type="number" th:field="*{idCuartel}" class="form-control" placeholder="ID Cuartel">
        <button type="submit" class="btn-accion">Consultar</button>
      </form>
    </div>

    <div class="card-busqueda">
      <h3><i data-lucide="users"></i> Compañía</h3>
      <form th:action="@{/api/oficial/asignacion/consultar}" th:object="${asignacionDto}" method="post">
        <input type="number" th:field="*{idCompania}" class="form-control" placeholder="ID Compañía">
        <button type="submit" class="btn-accion">Consultar</button>
      </form>
    </div>

    <div class="card-busqueda">
      <h3><i data-lucide="shield"></i> Cuerpo</h3>
      <form th:action="@{/api/oficial/asignacion/consultar}" th:object="${asignacionDto}" method="post">
        <input type="number" th:field="*{idCuerpo}" class="form-control" placeholder="ID Cuerpo">
        <button type="submit" class="btn-accion">Consultar</button>
      </form>
    </div>

    <div class="card-busqueda">
      <h3><i data-lucide="wrench"></i> Servicio</h3>
      <form th:action="@{/api/oficial/asignacion/consultar}" th:object="${asignacionDto}" method="post">
        <input type="number" th:field="*{idServicio}" class="form-control" placeholder="ID Servicio">
        <button type="submit" class="btn-accion">Consultar</button>
      </form>
    </div>

  </div>

  <div th:if="${usuariosAsignados != null}" class="resultados-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h2>Lista de Personal</h2>
      <span class="badge-criterio" th:text="${criterio}">Criterio</span>
    </div>

    <table class="tabla-resultados">
      <thead>
      <tr>
        <th>ID</th>
        <th>Nombre Completo</th>
        <th>Rango / Tipo</th>
        <th>Email</th>
        <th>Ubicación (Cuartel)</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="u : ${usuariosAsignados}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.nombre + ' ' + u.apellido}"></td>
        <td th:text="${u.tipoUsuario}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.nombreCuartel ?: 'No asignado'}"></td>
      </tr>
      <tr th:if="${usuariosAsignados.empty}">
        <td colspan="5" style="text-align: center; padding: 30px;">
          No se encontraron usuarios bajo este criterio.
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div th:if="${mensajeError}" style="margin-top: 20px; color: #ff6b6b; background: rgba(255,107,107,0.1); padding: 15px; border-radius: 5px;">
    <p th:text="${mensajeError}"></p>
  </div>
</main>

<script>
  lucide.createIcons();
</script>
</body>
</html>
