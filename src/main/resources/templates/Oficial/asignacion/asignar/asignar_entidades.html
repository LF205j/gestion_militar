<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Militar | Asignación de Destinos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/Home.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <style>
        .area-gestion-militar { min-height: 85vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; background-color: #f4f7f6; }
        .tarjeta-principal { background: #ffffff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; overflow: hidden; }
        .encabezado-oscuro { background-color: #2c3e50; color: #ffffff; padding: 25px 35px; display: flex; align-items: center; }
        .circulo-icono { width: 50px; height: 50px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px; font-size: 1.2rem; }
        .seccion-input { background-color: #fcfcfc; border-left: 4px solid #34495e; padding: 15px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #eee; border-left-width: 5px; }
        .etiqueta-form { font-weight: 700; color: #34495e; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .input-estilizado { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; background-color: white; }
        .info-usuario-fija { background-color: #e8f4fd; border-left: 5px solid #3498db; padding: 15px; margin-bottom: 25px; border-radius: 4px; }
        .btn-asignar { background-color: #27ae60; color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-asignar:hover { background-color: #219150; }
    </style>
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar_militar}"></header>

<main class="area-gestion-militar">
    <div class="tarjeta-principal">
        <div class="encabezado-oscuro">
            <div class="circulo-icono"><i class="fa-solid fa-map-location-dot"></i></div>
            <div>
                <h2 class="h5 mb-0" style="color:white">Hoja de Asignación</h2>
                <p class="mb-0 small" style="opacity: 0.8">Vinculación de personal a unidades y cuerpos</p>
            </div>
        </div>

        <div style="padding: 30px;">
            <div class="info-usuario-fija">
                <label class="etiqueta-form text-primary">Personal a Reasignar</label>
                <h4 class="h6 mb-1" th:text="${usuario.nombre + ' ' + usuario.apellido}">Nombre Apellido</h4>
                <span class="badge bg-dark" th:text="${usuario.class.simpleName}">RANGO</span>
                <span class="ms-2 small text-muted" th:text="${'ID: ' + usuario.id}"></span>
            </div>

            <form th:action="@{/api/oficial/asignar}" method="post">

                <input type="hidden" name="usuarioId" th:value="${usuario.id}">

                <div class="row">
                    <div class="col-md-6">
                        <div class="seccion-input">
                            <label class="etiqueta-form"><i class="fa-solid fa-building-shield me-2"></i>Cuartel</label>
                            <select name="idCuartel" class="input-estilizado">
                                <option value="">Seleccionar Cuartel...</option>
                                <option th:each="c : ${cuarteles}"
                                        th:value="${c.id}"
                                        th:text="${c.nombre_cuartel}"
                                        th:selected="${usuario.cuartel?.id == c.id}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="seccion-input">
                            <label class="etiqueta-form"><i class="fa-solid fa-person-military-pointing me-2"></i>Cuerpo</label>
                            <select name="idCuerpo" class="input-estilizado">
                                <option value="">Seleccionar Cuerpo...</option>
                                <option th:each="cp : ${cuerpos}"
                                        th:value="${cp.id}"
                                        th:text="${cp.denominacion_cuerpo}"
                                        th:selected="${usuario.cuerpo?.id == cp.id}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="seccion-input">
                    <label class="etiqueta-form"><i class="fa-solid fa-users-viewfinder me-2"></i>Compañía / Actividad</label>
                    <select name="idCompania" class="input-estilizado">
                        <option value="">Seleccionar Compañía...</option>
                        <option th:each="comp : ${companias}"
                                th:value="${comp.id}"
                                th:text="${comp.actividad_principal}"
                                th:selected="${usuario.compania?.id == comp.id}"></option>
                    </select>
                </div>

                <div class="alert alert-info small d-flex align-items-center">
                    <i class="fa-solid fa-circle-info me-3 fa-lg"></i>
                    <span>Al confirmar, se actualizarán las dependencias del usuario y se registrará en su legajo digital.</span>
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-asignar">
                        <i class="fa-solid fa-check-double me-2"></i>Confirmar Destinos
                    </button>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary d-flex align-items-center px-4" style="border-radius:6px">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
