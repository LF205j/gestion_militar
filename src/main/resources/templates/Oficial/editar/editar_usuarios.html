<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Militar | Edición de Personal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/Home.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">

    <style>
        .area-gestion-militar {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            background-color: #f4f7f6;
        }

        .tarjeta-principal {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 650px;
            overflow: hidden;
            border: none;
        }

        .encabezado-oscuro {
            background-color: #2c3e50;
            color: #ffffff;
            padding: 25px 35px;
            display: flex;
            align-items: center;
        }

        .circulo-icono {
            width: 55px; height: 55px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-right: 20px; font-size: 1.4rem;
        }

        .cuerpo-formulario { padding: 35px; }

        .seccion-input {
            background-color: #f8fbff;
            border-left: 5px solid #3498db;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        /* Resalte para el campo de búsqueda de ID */
        .seccion-id-ingreso {
            background-color: #fff3cd; /* Color sutil de atención */
            border-left: 5px solid #f39c12;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .etiqueta-form {
            display: block;
            font-weight: 700;
            color: #2c3e50;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-estilizado {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .input-estilizado:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .btn-principal {
            flex: 2;
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 600;
        }

        .btn-principal:hover { background-color: #1a252f; }

        .btn-secundario {
            flex: 1;
            background-color: #f8f9fa;
            color: #6c757d;
            border: 1px solid #dee2e6;
            padding: 14px;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
        }

        .divider-form { border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

<header th:replace="~{fragments/navbar :: navbar_militar}"></header>

<main class="area-gestion-militar">
    <div class="tarjeta-principal">

        <div class="encabezado-oscuro">
            <div class="circulo-icono"><i class="fa-solid fa-user-pen"></i></div>
            <div>
                <h2 class="h5 mb-1" style="color: white; margin:0;">Edición Manual de Personal</h2>
                <p class="mb-0 small" style="opacity: 0.8; margin:0;">Ingrese el ID del usuario para aplicar cambios</p>
            </div>
        </div>

        <div class="cuerpo-formulario">

            <div th:if="${mensaje}" class="alert alert-success py-2 small mb-4">
                <i class="fa-solid fa-check-circle me-2"></i> <span th:text="${mensaje}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger py-2 small mb-4">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> <span th:text="${error}"></span>
            </div>

            <form th:action="@{/api/oficial/editar/usuario}" th:object="${usuarioDto}" method="post">

                <div class="seccion-id-ingreso">
                    <label class="etiqueta-form">ID Militar del Usuario (Obligatorio)</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fa-solid fa-hashtag"></i></span>
                        <input type="number" th:field="*{id}" class="input-estilizado"
                               placeholder="Ingrese el ID a modificar (Ej: 102)" required>
                    </div>
                    <small class="text-muted mt-1 d-block">Asegúrese de que el ID sea correcto antes de guardar.</small>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="seccion-input">
                            <label class="etiqueta-form">Nuevo Nombre</label>
                            <input type="text" th:field="*{nombre}" class="input-estilizado" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="seccion-input">
                            <label class="etiqueta-form">Nuevo Apellido</label>
                            <input type="text" th:field="*{apellido}" class="input-estilizado" required>
                        </div>
                    </div>
                </div>

                <div class="seccion-input">
                    <label class="etiqueta-form">Actualizar Correo (Email)</label>
                    <input type="email" th:field="*{email}" class="input-estilizado" required>
                </div>

                <div class="seccion-input">
                    <label class="etiqueta-form">Asignar Rango / Grado</label>
                    <select th:field="*{tipoUsuario}" class="input-estilizado" required>
                        <option value="SOLDADO">SOLDADO</option>
                        <option value="SUBOFICIAL">SUBOFICIAL</option>
                        <option value="OFICIAL">OFICIAL</option>
                    </select>
                </div>

                <div class="divider-form"></div>

                <div class="seccion-input" style="border-left-color: #e74c3c;">
                    <label class="etiqueta-form">Cambiar Contraseña (Opcional)</label>
                    <input type="password" name="nuevaPass" class="input-estilizado" placeholder="Nueva clave...">
                </div>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn-principal">
                        <i class="fa-solid fa-save me-2"></i>Ejecutar Actualización
                    </button>
                    <a th:href="@{/api/oficial/consultar/usuario}" class="btn-secundario">
                        Cancelar
                    </a>
                </div>

            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
