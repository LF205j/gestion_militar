
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Cuarteles - Gestión Militar</title>
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/Home.css}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<header th:replace="fragments/navbar :: navbar_militar"></header>

<div class="search-container">
  <h2 class="search-title">Búsqueda por Identificador</h2>

  <form th:action="@{${targetAction}}" th:object="${cuartelDto}" method="post">
    <div class="form-group-custom">
      <label>Código ID del cuartel:</label>
      <input type="number" th:field="*{id}" class="input-militar" placeholder="Ej: 101" required>
    </div>
    <button type="submit" class="btn-buscar-militar">Consultar Registro</button>
  </form>

  <div th:if="${cuartel != null}" class="militar-result-card">
    <h3>Ficha del Cuartel Militar</h3>
    <p><strong>Número de Cuartel:</strong> <span th:text="${cuartel.id}"></span></p>
    <p><strong>Nombre Cuartel:</strong> <span th:text="${cuartel.nombreCuartel}"></span></p>
    <p><strong>Ubicacion :</strong> <span th:text="${cuartel.ubicacion}"></span></p>
    <p><strong>Cantidad Companias :</strong> <span th:text="${cuartel.cantidadCompanias}"></span></p>
  </div>

  <div th:if="${error != null}" class="error-msg-militar">
    <p th:text="${error}"></p>
  </div>
</div>
<script>
  lucide.createIcons();
</script>
</body>
</html>
