<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Militar - Eliminar Cuerpo</title>
    <link rel="stylesheet" th:href="@{/css/Home.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<header th:replace="~{fragments/navbar :: navbar_militar}"></header>

<main class="dashboard-container" style="display: flex; justify-content: center; align-items: flex-start; padding-top: 50px;">

    <div class="profile-card" style="max-width: 500px; width: 100%;">
        <div class="profile-header" style="background-color: #c0392b; color: white; padding: 20px 30px; border-radius: 8px 8px 0 0;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="profile-avatar" style="background: rgba(255,255,255,0.2);">
                    <i data-lucide="trash-2"></i>
                </div>
                <div>
                    <h2 style="margin: 0; font-size: 1.4rem;">Eliminar Servicio</h2>
                    <small style="opacity: 0.8;">Acción irreversible</small>
                </div>
            </div>
        </div>

        <div class="profile-body" style="background: white; padding: 30px; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px;">

            <div th:if="${mensaje}" style="background-color: #d4edda; color: #155724; padding: 15px; border-radius: 4px; margin-bottom: 20px; text-align: center; border: 1px solid #c3e6cb;">
                <i data-lucide="check-circle" style="vertical-align: middle; margin-right: 8px;"></i>
                <span th:text="${mensaje}"></span>
            </div>

            <form th:action="@{${targetAction}}" method="post">
                <div class="info-box" style="margin-bottom: 25px; border-left: 4px solid #c0392b;">
                    <label for="idServicio" style="display: block; font-weight: bold; color: #2c3e50; margin-bottom: 10px;">
                        <i data-lucide="hash" style="width: 16px; vertical-align: middle;"></i> ID del Servicio Militar
                    </label>
                    <input type="number" id="idServicio" name="id" required
                           placeholder="Ingrese el identificador..."
                           style="width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                           onfocus="this.style.borderColor='#c0392b'">
                </div>

                <button type="submit"
                        onclick="return confirm('¿Está seguro de que desea eliminar este registro de forma permanente?')"
                        style="width: 100%; background-color: #c0392b; color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.2s;">
                    <i data-lucide="alert-triangle" style="width: 20px;"></i>
                    Confirmar Baja Definitiva
                </button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a th:href="@{/api/oficial/consultar/cuartel}" style="color: #7f8c8d; text-decoration: none; font-size: 0.9rem;">
                    <i data-lucide="arrow-left" style="width: 14px; vertical-align: middle;"></i> Volver al listado
                </a>
            </div>
        </div>
    </div>
</main>

<script>
    lucide.createIcons();
</script>
</body>
</html>
